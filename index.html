<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Diet Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:15px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

select,input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.meal{
    margin-bottom:10px;
}

label{
    font-weight:bold;
}

button{
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
    table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#28a745;
    color:#fff;
}
    .stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin:20px 0;
}

.stat-card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

#weightChart{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>🥗 Diet Tracker</h1>
<div class="card">
    <label>Your Name</label>
    <input
        type="text"
        id="userName"
        placeholder="Enter your name"
    >

    <button onclick="saveName()">
        Save Name
    </button>

    <h3 id="welcome"></h3>
</div>
    <br><br><br>
    <div class="stats-grid">

    <div class="stat-card">
        <h4>Current Weight</h4>
        <h2 id="currentWeight">--</h2>
    </div>

    <div class="stat-card">
        <h4>Starting Weight</h4>
        <h2 id="startingWeight">--</h2>
    </div>

    <div class="stat-card">
        <h4>Total Lost</h4>
        <h2 id="weightLost">--</h2>
    </div>

    <div class="stat-card">
        <h4>Average Bloating</h4>
        <h2 id="avgBloating">--</h2>
    </div>

</div>
    <div class="card">
    <h3>📅 Monthly Summary</h3>

    <p>
        Days Logged:
        <span id="daysLogged">0</span>
    </p>

    <p>
        Average Weight:
        <span id="avgWeight">0</span>
    </p>
</div>

<canvas id="weightChart"></canvas>
<label>Select Day</label>
<select id="daySelect"></select>

<div id="planCard" class="card"></div>

<div class="card">
    <h3>📊 Daily Tracking</h3>

    <label>Weight (kg)</label>
    <input type="number" id="weight">

    <label>Bloating (0-10)</label>
    <input type="number" min="0" max="10" id="bloating">

    <label>
        <input type="checkbox" id="gas">
        Feeling Gas Today?
    </label><br>

    <label>Stool</label>
    <select id="stool">
        <option value="">Select</option>
        <option>Normal</option>
        <option>Soft</option>
        <option>Loose</option>
    </select>

    <button onclick="saveData()">Save Today's Data</button>
</div>
    <div class="card">
    <h3>📈 Tracking History</h3>

    <table id="historyTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Weight</th>
                <th>Bloating</th>
                <th>Gas</th>
                <th>Stool</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>
</div>

<script>
    let chart;

function updateDashboard() {

    const history =
        JSON.parse(
            localStorage.getItem("diet-history")
        ) || [];

    if (!history.length) return;

    const weights = history
        .filter(x => x.weight)
        .map(x => Number(x.weight));

    const bloatingValues = history
        .filter(x => x.bloating !== "")
        .map(x => Number(x.bloating));

    const startWeight = weights[0];
    const currentWeight =
        weights[weights.length - 1];

    const lost =
        (startWeight - currentWeight)
        .toFixed(1);

    const avgBloating =
        bloatingValues.length
        ? (
            bloatingValues.reduce(
                (a,b)=>a+b,0
            ) / bloatingValues.length
          ).toFixed(1)
        : "-";

    document.getElementById(
        "startingWeight"
    ).innerText = startWeight;

    document.getElementById(
        "currentWeight"
    ).innerText = currentWeight;

    document.getElementById(
        "weightLost"
    ).innerText =
        lost + " kg";

    document.getElementById(
        "avgBloating"
    ).innerText =
        avgBloating;

    const labels =
        history.map(x => x.date);

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById(
            "weightChart"
        ),
        {
            type:"line",
            data:{
                labels,
                datasets:[{
                    label:"Weight",
                    data:weights,
                    tension:.3
                }]
            }
        }
    );
    document.getElementById(
    "daysLogged"
).innerText =
    history.length;

const avgWeight =
(
    weights.reduce((a,b)=>a+b,0)
    / weights.length
).toFixed(1);

document.getElementById(
    "avgWeight"
).innerText =
    avgWeight + " kg";
}
let name = localStorage.getItem(
    "diet-user-name"
);

if (!name) {

    name = prompt(
        "What is your name?"
    );

    if (name) {
        localStorage.setItem(
            "diet-user-name",
            name
        );
    }
}

document.getElementById(
    "welcome"
).innerHTML =
`👋 Welcome, ${name}`;
const plans = {
    monday:{
        breakfast:"4 Idli + Sambar",
        lunch:"Rice + Chicken Curry + Veg",
        evening:"Coffee + Banana",
        dinner:"3 Chapati + Egg Curry"
    },
    tuesday:{
        breakfast:"3 Idli + Sambar",
        lunch:"Rice + Dal + Veg",
        evening:"Roasted Chana",
        dinner:"3 Chapati + Moong Dal + Veg"
    },
    wednesday:{
        breakfast:"2 Dosa + 3 Eggs",
        lunch:"Rice + Chicken Curry + Veg",
        evening:"Coffee",
        dinner:"3 Chapati + Egg Curry"
    },
    thursday:{
        breakfast:"Upma + 2 Eggs",
        lunch:"Rice + Fish Curry + Veg",
        evening:"Banana",
        dinner:"Chicken Soup + 2 Chapati"
    },
    friday:{
        breakfast:"2 Dosa + Sambar",
        lunch:"Rice + Sambar + Veg",
        evening:"Sprouts",
        dinner:"3 Chapati + Dal + Veg"
    },
    saturday:{
        breakfast:"4 Idli + Sambar",
        lunch:"Rice + Fish/Chicken + Veg",
        evening:"Coconut Water",
        dinner:"3 Chapati + Egg Curry"
    },
    sunday:{
        breakfast:"3 Idli + Omelette",
        lunch:"Small Chicken Biryani + Salad",
        evening:"Coffee",
        dinner:"Soup + 2 Chapati"
    }
};

const daySelect = document.getElementById("daySelect");
loadHistory();
    updateDashboard();
Object.keys(plans).forEach(day=>{
    const option = document.createElement("option");
    option.value = day;
    option.textContent =
        day.charAt(0).toUpperCase() + day.slice(1);
    daySelect.appendChild(option);
});

function showPlan(day){

    const plan = plans[day];

    document.getElementById("planCard").innerHTML = `
        <h2>${day.toUpperCase()}</h2>

        <div class="meal">🌅 <b>Breakfast:</b> ${plan.breakfast}</div>
        <div class="meal">🍛 <b>Lunch:</b> ${plan.lunch}</div>
        <div class="meal">☕ <b>Evening:</b> ${plan.evening}</div>
        <div class="meal">🌙 <b>Dinner:</b> ${plan.dinner}</div>
    `;

    loadData(day);
}

function saveData() {

    const today = new Date()
        .toISOString()
        .split("T")[0]; // 2026-06-08

    const data = {
        date: today,
        weight: document.getElementById("weight").value,
        bloating: document.getElementById("bloating").value,
        gas: document.getElementById("gas").checked ? "Yes" : "No",
        stool: document.getElementById("stool").value
    };

    let history =
        JSON.parse(
            localStorage.getItem("diet-history")
        ) || [];

    const existingIndex =
        history.findIndex(
            item => item.date === today
        );

    if (existingIndex >= 0) {
        history[existingIndex] = data;
    } else {
        history.push(data);
    }

    localStorage.setItem(
        "diet-history",
        JSON.stringify(history)
    );

    loadHistory();
    updateDashboard();

    alert("Saved");
}
    function loadHistory() {

    const history =
        JSON.parse(
            localStorage.getItem("diet-history")
        ) || [];

    history.sort(
        (a,b) =>
        new Date(b.date) -
        new Date(a.date)
    );

    const tbody =
        document.querySelector(
            "#historyTable tbody"
        );

    tbody.innerHTML = "";

    history.forEach(item => {

        tbody.innerHTML += `
            <tr>
                <td>${item.date}</td>
                <td>${item.weight}</td>
                <td>${item.bloating}</td>
                <td>${item.gas}</td>
                <td>${item.stool}</td>
            </tr>
        `;
    });
}

function loadData(day){

    const saved = localStorage.getItem("diet-"+day);

    if(!saved){
        document.getElementById("weight").value="";
        document.getElementById("bloating").value="";
        document.getElementById("gas").checked=false;
        document.getElementById("stool").value="";
        return;
    }

    const data = JSON.parse(saved);

    document.getElementById("weight").value=data.weight || "";
    document.getElementById("bloating").value=data.bloating || "";
    document.getElementById("gas").checked=data.gas || false;
    document.getElementById("stool").value=data.stool || "";
}

daySelect.addEventListener("change",()=>{
    showPlan(daySelect.value);
});

// Auto select today's day
const days = [
    "sunday",
    "monday",
    "tuesday",
    "wednesday",
    "thursday",
    "friday",
    "saturday"
];

const today = days[new Date().getDay()];

daySelect.value = today;
showPlan(today);

    function saveName() {

    const name =
        document.getElementById("userName")
        .value
        .trim();

    if (!name) {
        alert("Please enter your name");
        return;
    }

    localStorage.setItem(
        "diet-user-name",
        name
    );

    updateWelcome();
}

    const savedName =
    localStorage.getItem(
        "diet-user-name"
    );

if (savedName) {
    document.getElementById(
        "userName"
    ).value = savedName;
}

updateWelcome();

function updateWelcome() {

    const name =
        localStorage.getItem(
            "diet-user-name"
        );

    const welcome =
        document.getElementById(
            "welcome"
        );

    if (name) {
        welcome.innerHTML =
            `👋 Welcome, ${name}`;
    } else {
        welcome.innerHTML =
            "👋 Welcome";
    }
}
</script>

</body>
</html>
